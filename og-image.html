<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #F8F5F0;
    font-family: 'Jost', sans-serif;
    display: flex;
  }

  .left {
    flex: 0 0 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 64px;
    position: relative;
    background: #F8F5F0;
  }

  .left::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 80%, rgba(205,160,133,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 90% 10%, rgba(189,192,181,0.10) 0%, transparent 70%);
  }

  .logo {
    width: 52px;
    height: 52px;
    margin-bottom: 32px;
    position: relative;
  }

  .tag {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #CDA085;
    margin-bottom: 16px;
    position: relative;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #1A1815;
    margin-bottom: 20px;
    position: relative;
  }

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: #CDA085;
  }

  .sub {
    font-size: 14px;
    font-weight: 300;
    color: #6B6560;
    line-height: 1.6;
    letter-spacing: 0.01em;
    position: relative;
    max-width: 400px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #CDA085;
    margin: 24px 0;
    position: relative;
  }

  .creds {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    position: relative;
    margin-top: 28px;
  }

  .cred {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1A1815;
    background: rgba(189,192,181,0.25);
    border: 1px solid rgba(189,192,181,0.5);
    padding: 5px 12px;
    border-radius: 2px;
  }

  .right {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .right img {
    position: absolute;
    top: -8%;
    left: -10%;
    width: 130%;
    height: auto;
  }

  .right::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #F8F5F0 0%, transparent 30%);
    z-index: 1;
  }

  .right::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(205,160,133,0.08);
    mix-blend-mode: multiply;
    z-index: 2;
  }

  .url {
    position: absolute;
    bottom: 28px;
    right: 32px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(26,24,21,0.45);
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="left">
    <img class="logo" src="brand_assets/LG_logo.png" alt="LG">
    <div class="tag">Coach Ejecutiva · Autora · Docente</div>
    <h1>Laura González<br><em>Ortiz de Zárate</em></h1>
    <div class="divider"></div>
    <p class="sub">Coaching transformacional para empresas y personas que quieren crecer con propósito.</p>
    <div class="creds">
      <span class="cred">ICF Certificada</span>
      <span class="cred">Docente UCM</span>
      <span class="cred">Ellas Coach</span>
    </div>
  </div>

  <div class="right">
    <img src="brand_assets/IMG_2313.jpg" alt="Laura González">
  </div>

  <div class="url">lauragonzalezortizdezarate.com</div>
</body>
</html>
